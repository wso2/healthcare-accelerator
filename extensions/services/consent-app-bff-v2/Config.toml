# consent-app-bff-v2 Configuration Template
# Copy to Config.toml and fill in your values.

hostname = "localhost"
port = 9092
corsAllowedOrigin = "http://localhost:5175"

# IDP base URL — works for both WSO2 IS and Asgardeo
# WSO2 IS example:   "https://localhost:9443"
# Asgardeo example:  "https://api.asgardeo.io/t/mytenant"
idpBaseUrl = "https://api.asgardeo.io/t/anjucha"

# Leave empty to default to {idpBaseUrl}/oauth2/token
idpTokenEndpoint = "https://api.asgardeo.io/t/anjucha/oauth2/token"

clientId = "wr_2vZAjBMJwfOWm_Cg1dCZjUSAa"
clientSecret = "XtncxzbZrBfvdErkK5tcVx30NRfRcWrnFy5LdcXtXXga"

# Consent flow: "scope" for SMART scope flow, "purpose" for purpose+element flow
consentFlow = "purpose"

openfgcBaseUrl = "https://c32618cf-389d-44f1-93ee-b67a3468aae3-dev.e1-us-east-azure.choreoapis.dev/cms-paas/openfgc-consent-service/v1.0"
orgId = "ORG-001"
tppClientId = "TPP-CLIENT-001"
consentType = "patient-access"

# Scope flow specific
scopeConsentPurposeName = "SMART Scope Authorization"
scopeConsentElementName = "scope-access"
alwaysAllowedScopes = ["openid"]

singleConsentPerUser = true
showConsentElements = false

# Purpose flow: define one or more [[consentPurpose]] blocks
[[consentPurpose]]
name = "Access health data"
description = "Access your health data related to USCDI."
mandatory = false
elements = [
    "MedicationDispense", "Coverage", "CareTeam", "RelatedPerson", "DiagnosticReport",
    "PractitionerRole", "Goal", "MedicationRequest", "Location", "CarePlan",
    "Provenance", "Patient", "Observation", "Condition", "ServiceRequest",
    "QuestionnaireResponse", "Medication", "Immunization", "Specimen", "Procedure",
    "Practitioner", "Organization", "Device", "AllergyIntolerance", "DocumentReference",
    "Encounter"
]

[ballerina.log]
level = "DEBUG"